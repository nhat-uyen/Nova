<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nova</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg:        #0d0d0d;
            --bg2:       #111111;
            --bg3:       #1a1a1a;
            --border:    #222222;
            --cyan:      #00bcd4;
            --cyan-dim:  #00838f;
            --text:      #e0e0e0;
            --text-dim:  #666666;
            --user-bg:   #1a3a4a;
            --user-text: #80deea;
            --danger:    #f44336;
        }

        body {
            font-family: monospace;
            background: var(--bg);
            color: var(--text);
            height: 100dvh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* ── LOGIN ── */
        #login-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100dvh;
            gap: 14px;
            padding: 20px;
        }

        #login-screen h1 {
            color: var(--cyan);
            font-size: 2.2rem;
            letter-spacing: 4px;
            margin-bottom: 8px;
        }

        .login-field {
            display: flex;
            flex-direction: column;
            gap: 4px;
            width: 100%;
            max-width: 320px;
        }

        .login-field label {
            font-size: 0.75rem;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .login-field input {
            padding: 10px 14px;
            background: var(--bg3);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text);
            font-family: monospace;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
            width: 100%;
        }

        .login-field input:focus { border-color: var(--cyan); }

        #login-btn {
            width: 100%;
            max-width: 320px;
            padding: 11px;
            background: var(--cyan);
            border: none;
            border-radius: 6px;
            color: #000;
            font-family: monospace;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            margin-top: 4px;
            transition: background 0.2s;
        }

        #login-btn:hover { background: var(--cyan-dim); }
        #login-error { color: var(--danger); font-size: 0.85rem; min-height: 18px; }

        /* ── APP ── */
        #app {
            display: none;
            height: 100dvh;
            overflow: hidden;
        }

        .layout {
            display: flex;
            height: 100dvh;
            overflow: hidden;
        }

        /* ── SIDEBAR ── */
        #sidebar {
            width: 260px;
            min-width: 260px;
            background: var(--bg2);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transition: transform 0.25s ease;
        }

        #sidebar-header {
            padding: 16px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        #sidebar-header span {
            color: var(--cyan);
            font-size: 1.1rem;
            font-weight: bold;
            letter-spacing: 2px;
        }

        #new-conv-btn {
            padding: 6px 12px;
            background: transparent;
            border: 1px solid var(--cyan);
            border-radius: 5px;
            color: var(--cyan);
            font-family: monospace;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
        }

        #new-conv-btn:hover {
            background: var(--cyan);
            color: #000;
        }

        #conversations-list {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
        }

        .conv-item {
            padding: 10px 12px;
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
            transition: background 0.15s;
            border: 1px solid transparent;
        }

        .conv-item:hover { background: var(--bg3); }
        .conv-item.active { background: var(--bg3); border-color: var(--border); }

        .conv-title {
            flex: 1;
            font-size: 0.85rem;
            color: var(--text);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .conv-delete {
            color: var(--text-dim);
            font-size: 0.8rem;
            cursor: pointer;
            padding: 2px 5px;
            border-radius: 3px;
            opacity: 0;
            transition: all 0.15s;
            background: transparent;
            border: none;
        }

        .conv-item:hover .conv-delete { opacity: 1; }
        .conv-delete:hover { color: var(--danger); }

        #sidebar-footer {
            padding: 12px 16px;
            border-top: 1px solid var(--border);
        }

        #logout-btn {
            width: 100%;
            padding: 8px;
            background: transparent;
            border: 1px solid var(--border);
            border-radius: 5px;
            color: var(--text-dim);
            font-family: monospace;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        #logout-btn:hover { border-color: var(--danger); color: var(--danger); }

        /* ── MAIN ── */
        #main {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            min-width: 0;
            width: 100%;
        }

        #chat-header {
            padding: 12px 16px;
            background: var(--bg2);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            flex-shrink: 0;
        }

        #menu-toggle {
            display: none;
            background: transparent;
            border: none;
            color: var(--cyan);
            font-size: 1.3rem;
            cursor: pointer;
            flex-shrink: 0;
        }

        #chat-title {
            flex: 1;
            color: var(--text-dim);
            font-size: 0.85rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        #model-badge {
            font-size: 0.75rem;
            color: var(--text-dim);
            background: var(--bg3);
            padding: 3px 8px;
            border-radius: 10px;
            border: 1px solid var(--border);
            flex-shrink: 0;
            white-space: nowrap;
        }

        #messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px 16px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .message-row {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .message-row.user { align-items: flex-end; }
        .message-row.nova { align-items: flex-start; }

        .message-label {
            font-size: 0.7rem;
            color: var(--text-dim);
            padding: 0 4px;
        }

        .message {
            max-width: 75%;
            padding: 10px 14px;
            border-radius: 10px;
            line-height: 1.6;
            white-space: pre-wrap;
            word-break: break-word;
            font-size: 0.95rem;
        }

        .message.user {
            background: var(--user-bg);
            color: var(--user-text);
            border-bottom-right-radius: 3px;
        }

        .message.nova {
            background: var(--bg3);
            border: 1px solid var(--border);
            border-bottom-left-radius: 3px;
        }

        .message.thinking {
            color: var(--text-dim);
            font-style: italic;
            background: transparent;
            border: none;
            padding: 0;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        #empty-state {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: var(--text-dim);
            gap: 8px;
        }

        #empty-state h2 {
            color: var(--cyan);
            font-size: 1.5rem;
            letter-spacing: 3px;
        }

        /* ── MODE SELECTOR ── */
        #mode-bar, #input-area { width: 100%; }
        #mode-bar {
            padding: 8px 16px;
            background: var(--bg2);
            border-top: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 8px;
            flex-shrink: 0;
        }

        #mode-label-text {
            font-size: 0.75rem;
            color: var(--text-dim);
            flex-shrink: 0;
        }

        #mode-wrapper {
            position: relative;
        }

        #mode-toggle-btn {
            padding: 5px 12px;
            border-radius: 6px;
            border: 1px solid var(--cyan);
            background: transparent;
            color: var(--cyan);
            font-family: monospace;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 5px;
            white-space: nowrap;
        }

        #mode-toggle-btn:hover {
            background: var(--cyan);
            color: #000;
        }

        #mode-dropdown {
            display: none;
            position: absolute;
            bottom: calc(100% + 6px);
            left: 0;
            background: var(--bg2);
            border: 1px solid var(--border);
            border-radius: 8px;
            overflow: hidden;
            min-width: 200px;
            z-index: 100;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }

        #mode-dropdown.open { display: block; }

        .mode-option {
            padding: 10px 14px;
            cursor: pointer;
            font-family: monospace;
            font-size: 0.85rem;
            color: var(--text);
            transition: background 0.15s;
            display: flex;
            flex-direction: column;
            gap: 2px;
            border-bottom: 1px solid var(--border);
        }

        .mode-option:last-child { border-bottom: none; }
        .mode-option:hover { background: var(--bg3); }
        .mode-option.active { color: var(--cyan); }

        .mode-option .mode-desc {
            font-size: 0.72rem;
            color: var(--text-dim);
        }

        .mode-option.active .mode-desc { color: var(--cyan-dim); }

        /* ── INPUT ── */
        #input-area {
            padding: 12px 16px;
            background: var(--bg2);
            border-top: 1px solid var(--border);
            display: flex;
            gap: 8px;
            align-items: flex-end;
            flex-shrink: 0;
        }

        #user-input {
            flex: 1;
            padding: 10px 14px;
            background: var(--bg3);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-family: monospace;
            font-size: 0.95rem;
            height: 44px;
            outline: none;
            transition: border-color 0.2s;
            min-width: 0;
        }

        #user-input:focus { border-color: var(--cyan); }

        #send-btn {
            padding: 10px 18px;
            background: var(--cyan);
            border: none;
            border-radius: 8px;
            color: #000;
            font-family: monospace;
            font-weight: bold;
            font-size: 0.95rem;
            cursor: pointer;
            height: 44px;
            transition: background 0.2s;
            white-space: nowrap;
            flex-shrink: 0;
        }

        #send-btn:hover { background: var(--cyan-dim); }
        #send-btn:disabled { background: var(--border); color: var(--text-dim); cursor: not-allowed; }

        /* ── MOBILE ── */
        #sidebar-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.6);
            z-index: 10;
        }

        @media (max-width: 640px) {
            #sidebar {
                position: fixed;
                top: 0; left: 0; bottom: 0;
                z-index: 20;
                transform: translateX(-100%);
            }
            #sidebar.open { transform: translateX(0); }
            #menu-toggle { display: block; }
            #sidebar-overlay.show { display: block; }
            .message { max-width: 90%; }
            #mode-label-text { display: none; }
        }

        @media (min-width: 1200px) {
            #sidebar { width: 300px; min-width: 300px; }
            .message { max-width: 65%; }
        }

        /* ── COPY BUTTON ── */
        .message-row.nova:hover .copy-btn { opacity: 1; }

        .copy-btn {
            opacity: 0;
            position: absolute;
            top: 6px;
            right: 6px;
            padding: 3px 8px;
            background: var(--bg2);
            border: 1px solid var(--border);
            border-radius: 4px;
            color: var(--text-dim);
            font-family: monospace;
            font-size: 0.7rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .copy-btn:hover { color: var(--cyan); border-color: var(--cyan); }
        .copy-btn.copied { color: var(--cyan); border-color: var(--cyan); }

        .message.nova { position: relative; }

        /* ── SCROLLBAR ── */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
    </style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
    <h1>⬡ NOVA</h1>
    <div class="login-field">
        <label>Utilisateur</label>
        <input type="text" id="username-input" placeholder="username" autocomplete="username" />
    </div>
    <div class="login-field">
        <label>Mot de passe</label>
        <input type="password" id="password-input" placeholder="••••••" autocomplete="current-password" />
    </div>
    <button id="login-btn" onclick="login()">Connexion</button>
    <span id="login-error"></span>
</div>

<!-- APP -->
<div id="app">
    <div class="layout">

        <!-- SIDEBAR -->
        <div id="sidebar-overlay" onclick="closeSidebar()"></div>
        <div id="sidebar">
            <div id="sidebar-header">
                <span>⬡ NOVA</span>
                <div style="display:flex;gap:6px;align-items:center;">
                    <button id="lang-btn" onclick="toggleLang()" style="padding:4px 8px;background:transparent;border:1px solid var(--border);border-radius:4px;color:var(--text-dim);font-family:monospace;font-size:0.75rem;cursor:pointer;">EN</button>
                    <button id="new-conv-btn" onclick="newConversation()">+ Nouveau</button>
                </div>
            </div>
            <div id="conversations-list"></div>
            <div id="sidebar-footer">
                <button id="logout-btn" onclick="logout()">Déconnexion</button>
            </div>
        </div>

        <!-- MAIN -->
        <div id="main">
            <div id="chat-header">
                <button id="menu-toggle" onclick="toggleSidebar()">☰</button>
                <span id="chat-title">Sélectionne une conversation</span>
                <span id="model-badge">—</span>
            </div>

            <div id="messages">
                <div id="empty-state">
                    <h2>⬡ NOVA</h2>
                    <span>Commence une nouvelle conversation</span>
                </div>
            </div>

            <!-- MODE BAR -->
            <div id="mode-bar">
                <span id="mode-label-text">Mode :</span>
                <div id="mode-wrapper">
                    <button id="mode-toggle-btn" onclick="toggleModeDropdown()">
                        <span id="mode-current">Auto</span> ▾
                    </button>
                    <div id="mode-dropdown">
                        <div class="mode-option active" data-mode="auto" onclick="setMode('auto')">
                            Auto
                            <span class="mode-desc">Router decides automatically</span>
                        </div>
                        <div class="mode-option" data-mode="chat" onclick="setMode('chat')">
                            Chat
                            <span class="mode-desc">Forces gemma4</span>
                        </div>
                        <div class="mode-option" data-mode="code" onclick="setMode('code')">
                            Code
                            <span class="mode-desc">Forces deepseek-coder-v2</span>
                        </div>
                        <div class="mode-option" data-mode="deep" onclick="setMode('deep')">
                            Deep
                            <span class="mode-desc">Forces qwen2.5:32b</span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- INPUT -->
            <div id="input-area">
                <input type="text" id="user-input" placeholder="Parle à Nova..." inputmode="text" enterkeyhint="send" autocomplete="off" />
                <button id="send-btn" onclick="sendMessage()">Envoyer</button>
            </div>
        </div>

    </div>
</div>

<script>
    const i18n = {
        fr: {
            title: "⬡ NOVA",
            username: "Utilisateur",
            password: "Mot de passe",
            login: "Connexion",
            error_fields: "Remplis tous les champs.",
            error_creds: "Identifiants incorrects.",
            new_conv: "+ Nouveau",
            logout: "Déconnexion",
            no_conv: "Aucune conversation",
            select_conv: "Sélectionne une conversation",
            new_conv_title: "Nouvelle conversation",
            empty_state: "Commence une nouvelle conversation",
            placeholder: "Parle à Nova...",
            send: "Envoyer",
            thinking: "réfléchit...",
            you: "Toi",
            copy: "copier",
            copied: "copié!",
            mode: "Mode",
            mode_auto_desc: "Router decides automatically",
            mode_chat_desc: "Forces gemma4",
            mode_code_desc: "Forces deepseek-coder-v2",
            mode_deep_desc: "Forces qwen2.5:32b",
        },
        en: {
            title: "⬡ NOVA",
            username: "Username",
            password: "Password",
            login: "Login",
            error_fields: "Please fill in all fields.",
            error_creds: "Invalid credentials.",
            new_conv: "+ New",
            logout: "Logout",
            no_conv: "No conversations",
            select_conv: "Select a conversation",
            new_conv_title: "New conversation",
            empty_state: "Start a new conversation",
            placeholder: "Talk to Nova...",
            send: "Send",
            thinking: "thinking...",
            you: "You",
            copy: "copy",
            copied: "copied!",
            mode: "Mode",
            mode_auto_desc: "Router decides automatically",
            mode_chat_desc: "Forces gemma4",
            mode_code_desc: "Forces deepseek-coder-v2",
            mode_deep_desc: "Forces qwen2.5:32b",
        }
    };

    let lang = localStorage.getItem("nova_lang") || "fr";

    function t(key) {
        return i18n[lang][key] || key;
    }

    function applyLang() {
        // Login
        document.querySelectorAll(".login-field label")[0].textContent = t("username");
        document.querySelectorAll(".login-field label")[1].textContent = t("password");
        document.getElementById("login-btn").textContent = t("login");

        // Sidebar
        document.getElementById("new-conv-btn").textContent = t("new_conv");
        document.getElementById("logout-btn").textContent = t("logout");
        document.getElementById("sidebar-header").querySelector("span").textContent = t("title");

        // Input
        document.getElementById("user-input").placeholder = t("placeholder");
        document.getElementById("send-btn").textContent = t("send");

        // Mode bar
        const modeLabel = document.getElementById("mode-label-text");
        if (modeLabel) modeLabel.textContent = t("mode") + " :";

        // Mode descriptions
        const autoDesc = document.querySelector("[data-mode=auto] .mode-desc");
        const chatDesc = document.querySelector("[data-mode=chat] .mode-desc");
        const codeDesc = document.querySelector("[data-mode=code] .mode-desc");
        const deepDesc = document.querySelector("[data-mode=deep] .mode-desc");
        if (autoDesc) autoDesc.textContent = t("mode_auto_desc");
        if (chatDesc) chatDesc.textContent = t("mode_chat_desc");
        if (codeDesc) codeDesc.textContent = t("mode_code_desc");
        if (deepDesc) deepDesc.textContent = t("mode_deep_desc");

        // Chat header
        const chatTitle = document.getElementById("chat-title");
        if (chatTitle && chatTitle.textContent === "Sélectionne une conversation" || 
            chatTitle && chatTitle.textContent === "Select a conversation") {
            chatTitle.textContent = t("select_conv");
        }

        // Empty state
        const emptySpan = document.querySelector("#empty-state span");
        if (emptySpan) emptySpan.textContent = t("empty_state");

        // Lang button
        const langBtn = document.getElementById("lang-btn");
        if (langBtn) langBtn.textContent = lang === "fr" ? "FR" : "EN";

        // Conversations list empty
        const noConv = document.querySelector("#conversations-list div");
        if (noConv && (noConv.textContent === "Aucune conversation" || noConv.textContent === "No conversations")) {
            noConv.textContent = t("no_conv");
        }
    }

    function toggleLang() {
        lang = lang === "fr" ? "en" : "fr";
        localStorage.setItem("nova_lang", lang);
        applyLang();
    }

    let token = localStorage.getItem("nova_token");
    let currentConvId = null;
    let isThinking = false;
    let currentMode = localStorage.getItem("nova_mode") || "auto";

    if (token) initApp();
    document.addEventListener("DOMContentLoaded", applyLang);

    // ── LOGIN ──
    document.getElementById("password-input").addEventListener("keydown", e => {
        if (e.key === "Enter") login();
    });

    document.getElementById("user-input").addEventListener("keydown", e => {
        if (e.key === "Enter" && !e.shiftKey) {
            e.preventDefault();
            sendMessage();
        }
    });

    async function login() {
        const username = document.getElementById("username-input").value.trim();
        const password = document.getElementById("password-input").value;
        const errorEl = document.getElementById("login-error");
        errorEl.textContent = "";

        if (!username || !password) {
            errorEl.textContent = "Remplis tous les champs.";
            return;
        }

        const res = await fetch("/login", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ username, password })
        });

        if (res.ok) {
            const data = await res.json();
            token = data.token;
            localStorage.setItem("nova_token", token);
            initApp();
        } else {
            errorEl.textContent = "Identifiants incorrects.";
        }
    }

    function logout() {
        localStorage.removeItem("nova_token");
        location.reload();
    }

    // ── INIT ──
    function initApp() {
        document.getElementById("login-screen").style.display = "none";
        document.getElementById("app").style.display = "flex";
        setMode(currentMode);
        loadConversations();
    }

    // ── SIDEBAR ──
    function toggleSidebar() {
        document.getElementById("sidebar").classList.toggle("open");
        document.getElementById("sidebar-overlay").classList.toggle("show");
    }

    function closeSidebar() {
        document.getElementById("sidebar").classList.remove("open");
        document.getElementById("sidebar-overlay").classList.remove("show");
    }

    // ── MODE DROPDOWN ──
    function toggleModeDropdown() {
        document.getElementById("mode-dropdown").classList.toggle("open");
    }

    document.addEventListener("click", (e) => {
        if (!e.target.closest("#mode-wrapper")) {
            document.getElementById("mode-dropdown")?.classList.remove("open");
        }
    });

    function setMode(mode) {
        currentMode = mode;
        localStorage.setItem("nova_mode", mode);
        const labels = { auto: "Auto", chat: "Chat", code: "Code", deep: "Deep" };
        document.getElementById("mode-current").textContent = labels[mode];
        document.querySelectorAll(".mode-option").forEach(opt => {
            opt.classList.toggle("active", opt.dataset.mode === mode);
        });
        document.getElementById("mode-dropdown").classList.remove("open");
    }

    // ── CONVERSATIONS ──
    async function loadConversations() {
        const res = await fetch("/conversations", {
            headers: { "Authorization": `Bearer ${token}` }
        });
        if (res.status === 401) { logout(); return; }
        const convs = await res.json();
        renderConversations(convs);
    }

    function renderConversations(convs) {
        const list = document.getElementById("conversations-list");
        list.innerHTML = "";

        if (convs.length === 0) {
            list.innerHTML = '<div style="padding:16px;color:var(--text-dim);font-size:0.8rem;">Aucune conversation</div>';
            return;
        }

        for (const conv of convs) {
            const div = document.createElement("div");
            div.className = "conv-item" + (conv.id === currentConvId ? " active" : "");
            div.dataset.id = conv.id;
            div.innerHTML = `
                <span class="conv-title">${escapeHtml(conv.title)}</span>
                <button class="conv-delete" onclick="deleteConversation(event, ${conv.id})">✕</button>
            `;
            div.addEventListener("click", () => openConversation(conv.id, conv.title));
            list.appendChild(div);
        }
    }

    async function newConversation() {
        currentConvId = null;
        document.getElementById("messages").innerHTML = `
            <div id="empty-state">
                <h2>⬡ NOVA</h2>
                <span>Commence une nouvelle conversation</span>
            </div>
        `;
        document.getElementById("chat-title").textContent = "Nouvelle conversation";
        document.getElementById("model-badge").textContent = "—";
        document.querySelectorAll(".conv-item").forEach(el => el.classList.remove("active"));
        document.getElementById("user-input").focus();
        closeSidebar();
    }

    async function openConversation(id, title) {
        currentConvId = id;
        document.getElementById("chat-title").textContent = title;
        document.querySelectorAll(".conv-item").forEach(el => {
            el.classList.toggle("active", parseInt(el.dataset.id) === id);
        });

        const res = await fetch(`/conversations/${id}/messages`, {
            headers: { "Authorization": `Bearer ${token}` }
        });
        const msgs = await res.json();
        const messagesEl = document.getElementById("messages");
        messagesEl.innerHTML = "";

        for (const msg of msgs) {
            if (msg.role !== "system") {
                appendMessage(msg.role === "user" ? "user" : "nova", msg.content, msg.model);
            }
        }

        messagesEl.scrollTop = messagesEl.scrollHeight;
        closeSidebar();
    }

    async function deleteConversation(event, id) {
        event.stopPropagation();
        await fetch(`/conversations/${id}`, {
            method: "DELETE",
            headers: { "Authorization": `Bearer ${token}` }
        });
        if (currentConvId === id) newConversation();
        loadConversations();
    }

    // ── MESSAGES ──
    function appendMessage(role, content, model) {
        const emptyState = document.getElementById("empty-state");
        if (emptyState) emptyState.remove();

        const messagesEl = document.getElementById("messages");
        const row = document.createElement("div");
        row.className = `message-row ${role}`;

        const label = document.createElement("div");
        label.className = "message-label";
        label.textContent = role === "user" ? "Toi" : `Nova${model ? ` · ${model}` : ""}`;

        const bubble = document.createElement("div");
        bubble.className = `message ${role}`;
        bubble.textContent = content;

        if (role === "nova") {
            const copyBtn = document.createElement("button");
            copyBtn.className = "copy-btn";
            copyBtn.textContent = "copier";
            copyBtn.onclick = () => {
                try {
                    navigator.clipboard.writeText(content);
                } catch {
                    const ta = document.createElement("textarea");
                    ta.value = content;
                    document.body.appendChild(ta);
                    ta.select();
                    document.execCommand("copy");
                    document.body.removeChild(ta);
                }
                copyBtn.textContent = "copié!";
                copyBtn.classList.add("copied");
                setTimeout(() => {
                    copyBtn.textContent = "copier";
                    copyBtn.classList.remove("copied");
                }, 2000);
            };
            bubble.appendChild(copyBtn);
        }

        row.appendChild(label);
        row.appendChild(bubble);
        messagesEl.appendChild(row);
        messagesEl.scrollTop = messagesEl.scrollHeight;

        if (model) document.getElementById("model-badge").textContent = model;
        return bubble;
    }

    // ── CHAT ──
    async function sendMessage() {
        if (isThinking) return;
        const input = document.getElementById("user-input");
        const btn = document.getElementById("send-btn");
        const text = input.value.trim();
        if (!text) return;

        input.value = "";
        isThinking = true;
        btn.disabled = true;

        appendMessage("user", text);

        const messagesEl = document.getElementById("messages");
        const thinkingRow = document.createElement("div");
        thinkingRow.className = "message-row nova";
        thinkingRow.innerHTML = `
            <div class="message-label">Nova</div>
            <div class="message thinking">réfléchit...</div>
        `;
        messagesEl.appendChild(thinkingRow);
        messagesEl.scrollTop = messagesEl.scrollHeight;

        const res = await fetch("/chat", {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                "Authorization": `Bearer ${token}`
            },
            body: JSON.stringify({
                message: text,
                conversation_id: currentConvId,
                mode: currentMode
            })
        });

        thinkingRow.remove();

        if (res.status === 401) { logout(); return; }

        const data = await res.json();
        currentConvId = data.conversation_id;
        appendMessage("nova", data.response, data.model);

        isThinking = false;
        btn.disabled = false;
        input.focus();

        loadConversations();
    }

    // ── UTILS ──
    function escapeHtml(str) {
        return str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
    }
</script>
</body>
</html>
